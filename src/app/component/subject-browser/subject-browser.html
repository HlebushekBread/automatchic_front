<button class="mobile-filter-btn" (click)="showFilters.set(!showFilters())">
  {{ showFilters() ? 'Закрыть фильтры' : 'Показать фильтры' }}
</button>
<div class="page-layout">
  <aside class="filters" [class.is-open]="showFilters()">
    <div class="filter-group">
      <label>Поиск</label>
      <input
        type="text"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        placeholder="Введите название..."
      />
    </div>

    <div class="filter-group">
      <label>Тип оценивания</label>
      <select [ngModel]="selectedType()" (ngModelChange)="selectedType.set($event)">
        <option value="all">Все типы</option>
        @for (type of gradingTypes; track type) {
          <option [value]="type">{{ gradingTypeTranslation[type] }}</option>
        }
      </select>
    </div>
  </aside>

  <main class="subjects-grid">
    @for (subject of filteredSubjects(); track subject.id) {
      <app-browser-subject-component [subject]="subject"></app-browser-subject-component>
    } @empty {
      <div class="message">
        <p style="text-align: center; line-height: 1.6">
          Ничего не найдено.<br />
          Вы можете <a style="color: #007bff" href="/subjects/view">создать новую запись.</a><br />
          Сделайте ее публичной, чтобы ее смогли найти.
        </p>
      </div>
    }
  </main>
</div>
